<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PNGU Admin</title>
    <script>window.CMS_MANUAL_INIT = true;</script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'pngu-nerf/pngu',
            branch: 'main',
            // MUST be your worker URL without the "/auth" or "/" at the end
            base_url: 'https://pngu-auth.nolan.workers.dev', 
            auth_endpoint: 'auth'
          },
          load_config_file: false,
          media_folder: 'public/images/blasters',
          public_folder: '/images/blasters',
          collections: [
            {
              name: 'blasters',
              label: 'Blaster Data',
              folder: 'src/content/blasters',
              create: true,
              fields: [
                { label: 'Title', name: 'title', widget: 'string' },
                { label: 'Description', name: 'description', widget: 'text' },
                { label: 'Body', name: 'body', widget: 'markdown' }
              ]
            }
          ]
        }
      });
    </script>
  </body>
</html>
