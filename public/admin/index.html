<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PNGU Admin</title>
    <!-- Manual init lets us configure Decap inline below rather than via a
         /admin/config.yml file. -->
    <script>window.CMS_MANUAL_INIT = true;</script>
    <style>
      /* Floating uploader-shortcut banner — sits over Decap's UI in the
         bottom-right corner. The link updates as you navigate between
         entries: when you're editing /blasters/<slug>, the link points
         straight at /admin/uploader/?slug=<slug>&target=hero. No React,
         no Decap plugin — just a hashchange listener on Decap's
         hash-routed URL. Removing this block reverts to no shortcut. */
      .uploader-shortcut {
        position: fixed;
        bottom: 1rem;
        right: 1rem;
        z-index: 2147483647;
        background: rgba(20, 20, 20, 0.92);
        color: #fff;
        font-family: 'Sora', system-ui, sans-serif;
        font-size: 0.82rem;
        padding: 10px 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        max-width: 340px;
      }
      .uploader-shortcut a {
        color: #ff6b6b;
        text-decoration: none;
        font-weight: 600;
      }
      .uploader-shortcut a:hover { text-decoration: underline; }
      .uploader-shortcut .hint {
        display: block;
        font-size: 0.7rem;
        color: #999;
        margin-top: 2px;
      }
    </style>
  </head>
  <body>
    <div class="uploader-shortcut" id="uploader-shortcut">
      <a id="uploader-shortcut-link" href="/admin/uploader/" target="_blank" rel="noopener">
        Open image uploader ↗
      </a>
      <span class="hint" id="uploader-shortcut-hint">
        Slug auto-fills when you're editing a blaster.
      </span>
    </div>
    <script>
      // Decap uses hash routing. When the admin opens an entry the URL
      // becomes /admin/#/collections/blasters/entries/<slug>. Watch for
      // hash changes and rewrite the shortcut link to pre-fill the slug.
      (function () {
        var link = document.getElementById('uploader-shortcut-link');
        var hint = document.getElementById('uploader-shortcut-hint');
        function update() {
          var m = location.hash.match(
            /^#\/collections\/blasters\/entries\/([^/?]+)/
          );
          if (m && m[1]) {
            var slug = decodeURIComponent(m[1]);
            link.href =
              '/admin/uploader/?slug=' +
              encodeURIComponent(slug) +
              '&target=hero';
            link.textContent = 'Upload images for ' + slug + ' ↗';
            hint.textContent =
              'Opens /admin/uploader/?slug=' + slug + '. Change target ' +
              'in the uploader UI to pick a section.';
          } else {
            link.href = '/admin/uploader/';
            link.textContent = 'Open image uploader ↗';
            hint.textContent =
              "Slug auto-fills when you're editing a blaster.";
          }
        }
        window.addEventListener('hashchange', update);
        update();
      })();
    </script>
    <!--
      Decap CMS is loaded from a CDN with an exact version pin. Bumping the
      version requires regenerating the SRI hash:

          curl -s https://unpkg.com/decap-cms@3.5.0/dist/decap-cms.js \
            | openssl dgst -sha384 -binary \
            | openssl base64 -A \
            | sed 's/^/sha384-/'
    -->
    <script
      src="https://unpkg.com/decap-cms@3.5.0/dist/decap-cms.js"
      integrity="sha384-0qv+oSpofFn9VZ7RJ+vV8Tc4zcYtho3xHfLsM2pPimFVFoCMuU37MnWWxv83yHoR"
      crossorigin="anonymous"
    ></script>
    <script>
      /**
       * Images do NOT go in the repo. Hero + per-section galleries are
       * managed at /admin/uploader/?slug=<slug>&target=<hero|section> and
       * stored in R2. The Decap form below has no image widgets — only
       * text fields, numbers, booleans, and a markdown body per section.
       */
      // Section keys must stay in sync with SECTION_KEYS in
      // src/lib/blaster-paths.ts and the schema in src/content.config.ts.
      var section = function (label, name) {
        return {
          label: label,
          name: name,
          widget: 'object',
          collapsed: true,
          required: false,
          hint:
            'Upload images for this section at /admin/uploader/?slug=<entry-slug>&target=' +
            name,
          fields: [
            {
              label: 'Body',
              name: 'body',
              widget: 'markdown',
              required: false,
              // No inline image embedding — images live in R2 only.
              buttons: [
                'bold',
                'italic',
                'code',
                'link',
                'heading-one',
                'heading-two',
                'heading-three',
                'quote',
                'bulleted-list',
                'numbered-list',
              ],
              editor_components: [],
            },
          ],
        };
      };

      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'pngu-nerf/pngu',
            branch: 'main',
            // Worker URL — no trailing slash, no "/auth".
            base_url: 'https://pngu-auth.vanschmusnolan.workers.dev',
            auth_endpoint: 'auth',
          },
          load_config_file: false,
          // Decap requires media_folder at config root, even when no
          // field uses it. Every markdown widget below has the inline
          // image button removed (buttons[] + editor_components: []),
          // so this path should never receive an upload in practice.
          // If you ever see files appear here, audit the form before
          // committing. All real blaster images live in R2 and are
          // managed at /admin/uploader/.
          media_folder: 'public/_decap-do-not-use',
          public_folder: '/_decap-do-not-use',
          collections: [
            {
              name: 'blasters',
              label: 'Blaster Data',
              label_singular: 'Blaster',
              folder: 'src/content/blasters',
              create: true,
              slug: '{{slug}}',
              summary:
                '{{title}}{{#if tagline}} — {{tagline}}{{/if}}',
              fields: [
                {
                  label: 'Title',
                  name: 'title',
                  widget: 'string',
                  hint: 'Display name of the blaster.',
                },
                {
                  label: "Blaster designer's name",
                  name: 'designer',
                  widget: 'string',
                  required: false,
                  hint:
                    'Who designed the blaster (e.g. "FoamRanger", ' +
                    '"Captain Slug"). Shown under the title.',
                },
                {
                  label: 'Hero filename',
                  name: 'heroFilename',
                  widget: 'string',
                  required: false,
                  default: 'hero.jpg',
                  hint:
                    'Filename of the hero image inside R2 at <slug>/hero/. ' +
                    'Upload first at /admin/uploader/?slug=<slug>&target=hero. ' +
                    'Leave as hero.jpg unless multiple hero candidates exist.',
                },

                // ── Quick-stat infographic ────────────────────────────
                {
                  label: 'Quick Stats',
                  name: 'stats',
                  widget: 'object',
                  collapsed: true,
                  required: false,
                  hint: 'Hard data shown as a row of mini cards at the top.',
                  fields: [
                    {
                      label: 'Blaster type',
                      name: 'blasterType',
                      widget: 'string',
                      required: false,
                      hint:
                        'Short genus label, e.g. "Springer", "Flywheel", ' +
                        '"Rev-trigger", "Manual".',
                    },
                    {
                      label: 'Max FPS',
                      name: 'maxFps',
                      widget: 'number',
                      required: false,
                      value_type: 'int',
                      hint: 'Highest FPS observed across all darts.',
                    },
                    {
                      label: 'Recommended FPS — min',
                      name: 'recommendedFpsMin',
                      widget: 'number',
                      required: false,
                      value_type: 'int',
                      hint:
                        'Lower bound of the field-rules range you tune to. ' +
                        'Leave blank if only an upper bound matters.',
                    },
                    {
                      label: 'Recommended FPS — max',
                      name: 'recommendedFpsMax',
                      widget: 'number',
                      required: false,
                      value_type: 'int',
                      hint:
                        'Upper bound of the recommended range. Pair with ' +
                        'min — the page draws a horizontal range bar.',
                    },
                    {
                      label: 'Kit price (USD)',
                      name: 'kitPriceUSD',
                      widget: 'number',
                      required: false,
                      value_type: 'float',
                      hint: 'Hardware kit only, no printed parts.',
                    },
                    {
                      label: 'Total price (USD)',
                      name: 'totalPriceUSD',
                      widget: 'number',
                      required: false,
                      value_type: 'float',
                      hint: 'Hardware kit + printed parts + everything to build.',
                    },
                    {
                      label: 'Shipping (USD)',
                      name: 'shippingUSD',
                      widget: 'number',
                      required: false,
                      value_type: 'float',
                    },
                    {
                      label: 'Battery',
                      name: 'battery',
                      widget: 'string',
                      required: false,
                      hint: 'Short label, e.g. "2S 250mAh" or "AA × 4".',
                    },
                    {
                      label: 'Mag system',
                      name: 'magSystem',
                      widget: 'string',
                      required: false,
                      hint: 'Short label, e.g. "Talon" or "Hopper-fed".',
                    },
                    {
                      label: 'Bragging rights',
                      name: 'braggingRights',
                      widget: 'string',
                      required: false,
                      hint: 'One-line standout fact, e.g. "Lightest in class".',
                    },
                    {
                      label: 'LiPo safe to overvolt?',
                      name: 'lipoSafe',
                      widget: 'boolean',
                      required: false,
                      default: false,
                    },
                    {
                      label: 'Brushless FPS dial',
                      name: 'brushlessFpsDial',
                      widget: 'boolean',
                      required: false,
                      default: false,
                    },
                    {
                      label: 'Adjustable spring compression',
                      name: 'springPrecompression',
                      widget: 'boolean',
                      required: false,
                      default: false,
                      hint: 'Spring tension can be tuned without disassembly.',
                    },
                    {
                      label: 'Picatinny mount',
                      name: 'picatinnyMount',
                      widget: 'boolean',
                      required: false,
                      default: false,
                    },
                    {
                      label: 'M-LOK mount',
                      name: 'mlocMount',
                      widget: 'boolean',
                      required: false,
                      default: false,
                    },
                    {
                      label: 'Sling points',
                      name: 'slingPoints',
                      widget: 'boolean',
                      required: false,
                      default: false,
                    },
                    {
                      label: 'Mags gravity-drop',
                      name: 'gravityDropMags',
                      widget: 'boolean',
                      required: false,
                      default: false,
                    },
                    {
                      label: 'Has catch issues',
                      name: 'catchIssues',
                      widget: 'boolean',
                      required: false,
                      default: false,
                    },
                    {
                      label: 'A1-printable',
                      name: 'a1Printable',
                      widget: 'boolean',
                      required: false,
                      default: false,
                      hint: 'Fits on a Bambu A1 build plate without splitting.',
                    },
                    {
                      label: 'Beginner-friendly to print',
                      name: 'beginnerFriendlyPrint',
                      widget: 'boolean',
                      required: false,
                      default: false,
                    },
                    {
                      label: 'Beginner-friendly to assemble',
                      name: 'beginnerFriendlyAssembly',
                      widget: 'boolean',
                      required: false,
                      default: false,
                    },
                  ],
                },

                // ── Review sections (markdown body each) ──────────────
                section('Price & value', 'price'),
                section('Build quality', 'buildQuality'),
                section('Ergonomics', 'ergonomics'),
                section('Maintenance & modularity', 'maintenance'),
                section('Failure points & support', 'failurePoints'),
                section('Printing & assembly', 'printingAssembly'),

                // ── Conclusion / verdict block ────────────────────────
                {
                  label: 'Verdict',
                  name: 'verdict',
                  widget: 'select',
                  required: false,
                  options: [
                    { label: 'Hell naw (skip)', value: 'skip' },
                    {
                      label:
                        "If you don't have a blaster for that niche yet",
                      value: 'niche',
                    },
                    {
                      label: 'Yes, even if you have one — worth the upgrade',
                      value: 'upgrade',
                    },
                  ],
                  hint: 'Drives the verdict-block colour at the bottom.',
                },
                {
                  label: 'Better alternative',
                  name: 'betterAlternative',
                  widget: 'string',
                  required: false,
                  hint:
                    'Only fill if verdict is "niche". Name the blaster that ' +
                    'already fills the role better, e.g. "Lynx".',
                },
                {
                  label: 'Final highlights',
                  name: 'finalHighlights',
                  widget: 'markdown',
                  required: false,
                  buttons: [
                    'bold',
                    'italic',
                    'code',
                    'link',
                    'bulleted-list',
                  ],
                  editor_components: [],
                  hint: 'What this blaster does better than every other.',
                },
                {
                  label: 'Final warnings',
                  name: 'finalWarnings',
                  widget: 'markdown',
                  required: false,
                  buttons: [
                    'bold',
                    'italic',
                    'code',
                    'link',
                    'bulleted-list',
                  ],
                  editor_components: [],
                  hint: 'Issues a buyer should know about before clicking buy.',
                },
                {
                  label: 'Closing note',
                  name: 'closingNote',
                  widget: 'string',
                  required: false,
                  hint: 'Optional cheeky one-liner at the bottom.',
                },

                // ── Remixes ──────────────────────────────────────────
                {
                  label: 'Remixes',
                  name: 'remixes',
                  widget: 'list',
                  collapsed: true,
                  required: false,
                  summary: '{{fields.label}}',
                  hint:
                    'Remix variants of this blaster — each is a name + ' +
                    'URL plus an optional one-line note. Rendered as its ' +
                    'own section on the public page.',
                  fields: [
                    {
                      label: 'Name',
                      name: 'label',
                      widget: 'string',
                      hint: 'Display name of the remix.',
                    },
                    {
                      label: 'URL',
                      name: 'url',
                      widget: 'string',
                      pattern: ['^https?://', 'Must start with http:// or https://'],
                    },
                    {
                      label: 'Note',
                      name: 'note',
                      widget: 'string',
                      required: false,
                      hint: 'Optional short description (e.g. "Stockless variant").',
                    },
                  ],
                },

                // ── External links ────────────────────────────────────
                {
                  label: 'External links',
                  name: 'links',
                  widget: 'list',
                  collapsed: true,
                  required: false,
                  summary: '{{fields.category}}: {{fields.label}}',
                  hint:
                    'Vendor pages, file downloads, support threads, ' +
                    'community links. Rendered grouped by category.',
                  fields: [
                    {
                      label: 'Category',
                      name: 'category',
                      widget: 'select',
                      options: [
                        { label: 'Vendor', value: 'vendor' },
                        { label: 'Remix', value: 'remix' },
                        { label: 'File downloads', value: 'files' },
                        { label: 'Support', value: 'support' },
                        { label: 'Community', value: 'community' },
                        { label: 'Printables', value: 'printables' },
                        { label: 'Other', value: 'other' },
                      ],
                    },
                    { label: 'Label', name: 'label', widget: 'string' },
                    {
                      label: 'URL',
                      name: 'url',
                      widget: 'string',
                      pattern: ['^https?://', 'Must start with http:// or https://'],
                    },
                  ],
                },
              ],
            },
          ],
        },
      });
    </script>
  </body>
</html>
