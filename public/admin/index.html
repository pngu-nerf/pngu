<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PNGU Admin</title>
    <!-- Manual init lets us configure Decap inline below rather than via a
         /admin/config.yml file. -->
    <script>window.CMS_MANUAL_INIT = true;</script>
  </head>
  <body>
    <!--
      Decap CMS is loaded from a CDN with an exact version pin. Replace the
      `integrity` attribute below with the real SRI hash for this version:

          curl -s https://unpkg.com/decap-cms@3.5.0/dist/decap-cms.js \
            | openssl dgst -sha384 -binary \
            | openssl base64 -A \
            | sed 's/^/sha384-/'

      Then paste the result into the integrity= attribute. Bumping the version
      number requires regenerating the hash.
    -->
    <script
      src="https://unpkg.com/decap-cms@3.5.0/dist/decap-cms.js"
      integrity="sha384-0qv+oSpofFn9VZ7RJ+vV8Tc4zcYtho3xHfLsM2pPimFVFoCMuU37MnWWxv83yHoR"
      crossorigin="anonymous"
    ></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'pngu-nerf/pngu',
            branch: 'main',
            // Worker URL — no trailing slash, no "/auth".
            base_url: 'https://pngu-auth.vanschmusnolan.workers.dev',
            auth_endpoint: 'auth',
          },
          load_config_file: false,
          media_folder: 'public/images/blasters',
          public_folder: '/images/blasters',
          collections: [
            {
              name: 'blasters',
              label: 'Blaster Data',
              folder: 'src/content/blasters',
              create: true,
              fields: [
                { label: 'Title', name: 'title', widget: 'string' },
                { label: 'Description', name: 'description', widget: 'text' },
                { label: 'Body', name: 'body', widget: 'markdown' },
              ],
            },
          ],
        },
      });
    </script>
  </body>
</html>
